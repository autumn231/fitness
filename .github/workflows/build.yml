name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        id: apk
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/fitness-release.apk
          echo "version=$(grep -oP 'versionName = \"\K[^\"]+' app/build.gradle.kts)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: |
          ts=$(date +'%Y%m%d-%H%M%S')
          echo "tag=v${{ steps.apk.outputs.version }}-$ts" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          version="${{ steps.apk.outputs.version }}"
          # 从 CHANGELOG.md 提取 ## v{version} 段落（到下一个 ## 为止）
          awk -v ver="v$version" '
            /^## v/ {
              if (in_section) exit
              if (index($0, "## " ver)) { in_section=1; next }
            }
            in_section { print }
          ' CHANGELOG.md > /tmp/release_body.md
          # 若未匹配到，使用兜底文案
          if [ ! -s /tmp/release_body.md ]; then
            printf '## 更新内容\n\n本版本的详细更新请见 [CHANGELOG.md](CHANGELOG.md)。\n' > /tmp/release_body.md
          fi
          echo "Extracted body for v$version:"
          cat /tmp/release_body.md

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: fitness ${{ steps.apk.outputs.version }} (${{ steps.apk.outputs.sha }})
          body_path: /tmp/release_body.md
          files: artifacts/fitness-release.apk
          make_latest: true
